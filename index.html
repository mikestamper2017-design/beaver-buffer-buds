<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beaver Buffer Buds | Versus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="score-tag">YOU: <span id="percent-player">0</span>%</div>
            <div class="score-tag">BUD: <span id="percent-bud">0</span>%</div>
        </div>

        <div id="item-dock">
            <div class="item-slot" id="slot-poutine" title="Poutine: Slow Move">🍟</div>
            <div class="item-slot" id="slot-syrup" title="Syrup: Freeze">🍯</div>
            <div class="item-slot active" id="slot-snowball" title="Snowball: Reset">⚪</div>
            <div class="item-slot" id="slot-leaf" title="Golden Leaf: Power Up">🍁</div>
        </div>

        <div id="action-btn-container">
            <button id="action-btn">GIVE 'ER!</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>

    <script>
        // Simple UI script to handle switching active items in the dock
        const slots = document.querySelectorAll('.item-slot');
        slots.forEach(slot => {
            slot.addEventListener('click', () => {
                slots.forEach(s => s.classList.remove('active'));
                slot.classList.add('active');
                // Tell game.js which item is now active
                if(window.setActiveItem) {
                    window.setActiveItem(slot.getAttribute('data-item'));
                }
            });
        });
    </script>

</body>
</html>
